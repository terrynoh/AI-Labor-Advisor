<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>น้องช้าง — AI Labor Advisor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #dff0e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 520px;
            margin: 0 auto;
            box-shadow: 0 0 40px rgba(0,0,0,0.12);
        }

        /* ── 헤더 ── */
        .header {
            background: #06C755;
            color: white;
            padding: 13px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 10px rgba(6,199,85,0.35);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-flag { font-size: 24px; line-height: 1; }
        .header-texts { display: flex; flex-direction: column; }
        .header-title { font-size: 15px; font-weight: 800; letter-spacing: 0.3px; }
        .header-sub { font-size: 11px; opacity: 0.88; margin-top: 1px; }
        .reset-btn {
            background: rgba(255,255,255,0.22);
            border: 1.5px solid rgba(255,255,255,0.5);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.38); }

        /* ── 채팅 영역 ── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #eaf5ee;
        }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #b2d8be; border-radius: 4px; }

        /* ── 봇 말풍선 (LINE 스타일) ── */
        .msg-row-bot {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(145deg, #7c3aed, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(124,58,237,0.35);
        }
        .bot-col { display: flex; flex-direction: column; gap: 4px; max-width: calc(100% - 54px); }
        .bot-name { font-size: 11.5px; color: #6b7280; font-weight: 700; padding-left: 4px; }

        .bubble {
            padding: 11px 15px;
            border-radius: 20px;
            line-height: 1.75;
            font-size: 14.5px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .bubble.bot {
            background: white;
            color: #1f2937;
            border-bottom-left-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.09);
        }

        /* ── 유저 말풍선 ── */
        .msg-row-user { display: flex; justify-content: flex-end; }
        .bubble.user {
            background: #06C755;
            color: white;
            border-bottom-right-radius: 5px;
            max-width: 75%;
            box-shadow: 0 2px 8px rgba(6,199,85,0.32);
        }

        /* ── 타이핑 인디케이터 ── */
        .msg-row-typing { display: flex; align-items: flex-end; gap: 8px; }
        .typing-bubble {
            background: white;
            padding: 13px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.09);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .typing-bubble span {
            display: inline-block;
            width: 8px; height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            animation: dot-bounce 1.3s infinite ease-in-out;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes dot-bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-7px); }
        }

        /* ── turns 표시 ── */
        .turns-info {
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            padding: 3px 0 2px;
            background: #eaf5ee;
            flex-shrink: 0;
        }

        /* ── 입력 영역 ── */
        .input-area {
            background: white;
            padding: 10px 12px 12px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.06);
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            border: 1.5px solid #e5e7eb;
            border-radius: 22px;
            padding: 10px 16px;
            font-size: 14.5px;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.5;
            font-family: inherit;
            background: #f9fafb;
            color: #1f2937;
            transition: border-color 0.2s, background 0.2s;
        }
        .input-area textarea:focus {
            border-color: #06C755;
            background: white;
        }
        .input-area textarea::placeholder { color: #b0bec5; }
        .send-btn {
            background: #06C755;
            color: white;
            border: none;
            width: 46px; height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(6,199,85,0.42);
            transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
        }
        .send-btn:hover { background: #05b84d; box-shadow: 0 4px 14px rgba(6,199,85,0.5); }
        .send-btn:active { transform: scale(0.92); }
        .send-btn:disabled {
            background: #d1d5db;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .send-btn svg { display: block; }
    </style>
</head>
<body>

    <!-- 헤더: AI Labor Advisor 서비스명만 -->
    <div class="header">
        <div class="header-left">
            <span class="header-flag">🇹🇭</span>
            <div class="header-texts">
                <div class="header-title">AI Labor Advisor</div>
                <div class="header-sub">ที่ปรึกษากฎหมายแรงงานไทย</div>
            </div>
        </div>
        <button class="reset-btn" onclick="resetChat()">🔄 เริ่มใหม่</button>
    </div>

    <div class="chat-container" id="chatContainer"></div>
    <div class="turns-info" id="turnsInfo"></div>

    <div class="input-area">
        <textarea
            id="userInput"
            placeholder="พิมพ์ข้อความ... (ไม่เกิน 1,000 ตัวอักษร)"
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="ส่ง">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <script>
        /* ── 보라색 코끼리 마스코트 SVG ── */
        const ELEPHANT_SVG = `<svg width="26" height="26" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <!-- ears -->
          <ellipse cx="9"  cy="22" rx="7" ry="10" fill="#a78bfa"/>
          <ellipse cx="39" cy="22" rx="7" ry="10" fill="#a78bfa"/>
          <ellipse cx="9"  cy="22" rx="4.5" ry="7" fill="#ddd6fe"/>
          <ellipse cx="39" cy="22" rx="4.5" ry="7" fill="#ddd6fe"/>
          <!-- head -->
          <circle cx="24" cy="22" r="14" fill="#c4b5fd"/>
          <!-- eyes -->
          <circle cx="19" cy="19" r="2.8" fill="white"/>
          <circle cx="29" cy="19" r="2.8" fill="white"/>
          <circle cx="19.8" cy="19.5" r="1.5" fill="#3b0764"/>
          <circle cx="29.8" cy="19.5" r="1.5" fill="#3b0764"/>
          <circle cx="20.4" cy="18.9" r="0.6" fill="white"/>
          <circle cx="30.4" cy="18.9" r="0.6" fill="white"/>
          <!-- trunk -->
          <path d="M21 30 Q18 36 20 41 Q22 45 24 41 Q23 36 22 30Z" fill="#a78bfa"/>
          <!-- smile -->
          <path d="M18.5 26.5 Q24 30 29.5 26.5" stroke="#7c3aed" stroke-width="1.8"
                stroke-linecap="round" fill="none"/>
          <!-- blush -->
          <ellipse cx="15" cy="26" rx="3" ry="1.8" fill="#f9a8d4" opacity="0.55"/>
          <ellipse cx="33" cy="26" rx="3" ry="1.8" fill="#f9a8d4" opacity="0.55"/>
        </svg>`;

        const chatContainer = document.getElementById("chatContainer");
        const userInput     = document.getElementById("userInput");
        const sendBtn       = document.getElementById("sendBtn");
        const turnsInfo     = document.getElementById("turnsInfo");

        function makeAvatar() {
            const el = document.createElement("div");
            el.className = "avatar";
            el.innerHTML = ELEPHANT_SVG;
            return el;
        }

        function addBotBubble(text) {
            const row = document.createElement("div");
            row.className = "msg-row-bot";

            const col = document.createElement("div");
            col.className = "bot-col";

            const nameEl = document.createElement("div");
            nameEl.className = "bot-name";
            nameEl.textContent = "น้องช้าง";

            const bubble = document.createElement("div");
            bubble.className = "bubble bot";
            bubble.textContent = text;

            col.appendChild(nameEl);
            col.appendChild(bubble);
            row.appendChild(makeAvatar());
            row.appendChild(col);
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addUserBubble(text) {
            const row = document.createElement("div");
            row.className = "msg-row-user";
            const bubble = document.createElement("div");
            bubble.className = "bubble user";
            bubble.textContent = text;
            row.appendChild(bubble);
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const row = document.createElement("div");
            row.className = "msg-row-typing";
            row.id = "typingRow";

            const typing = document.createElement("div");
            typing.className = "typing-bubble";
            typing.innerHTML = "<span></span><span></span><span></span>";

            row.appendChild(makeAvatar());
            row.appendChild(typing);
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById("typingRow");
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addUserBubble(text);
            userInput.value = "";
            autoResize(userInput);
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                hideTyping();

                if (data.error) {
                    addBotBubble("❌ เกิดข้อผิดพลาด: " + data.error);
                } else {
                    addBotBubble(data.reply);
                    if (data.turns_left !== undefined && data.turns_left <= 5) {
                        turnsInfo.textContent = `เหลืออีก ${data.turns_left} รอบ`;
                    }
                }
            } catch (e) {
                hideTyping();
                addBotBubble("❌ เชื่อมต่อไม่ได้ กรุณาลองใหม่ครับ");
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        async function resetChat() {
            const res = await fetch("/reset", { method: "POST" });
            const data = await res.json();
            chatContainer.innerHTML = "";
            turnsInfo.textContent = "";
            addBotBubble(data.reply);
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = "auto";
            el.style.height = Math.min(el.scrollHeight, 120) + "px";
        }

        /* 시작 메시지 — 챗봇 이름 น้องช้าง, AI 없음 */
        addBotBubble(
            "สวัสดีครับ 👋 ยินดีต้อนรับครับ\n\n" +
            "ผม น้องช้าง 🐘 ช่วยเรื่องสิทธิ์แรงงานไทยได้ครับ เช่น\n" +
            "🔴 ถูกเลิกจ้าง\n" +
            "💰 ค่าจ้างค้างจ่าย\n" +
            "📅 วันลาและค่าชดเชย\n\n" +
            "วันนี้มีปัญหาเรื่องอะไรครับ?"
        );
    </script>
</body>
</html>
